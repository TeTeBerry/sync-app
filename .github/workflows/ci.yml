name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Read sibling repo in same org for @sync/chat-contracts (../sync-app-backend).
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: sync-app

      - name: Checkout backend (chat contracts)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sync-app-backend
          path: sync-app-backend

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sync-app/package-lock.json

      - name: Install
        working-directory: sync-app
        run: npm ci --legacy-peer-deps

      - name: Check
        working-directory: sync-app
        run: npm run check
        env:
          CI: true

  build-weapp:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: sync-app

      - name: Checkout backend (chat contracts)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sync-app-backend
          path: sync-app-backend

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sync-app/package-lock.json

      - name: Install
        working-directory: sync-app
        run: npm ci --legacy-peer-deps

      - name: Build weapp and check bundle size
        working-directory: sync-app
        run: npm run build:weapp:size
